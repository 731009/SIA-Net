swap_size: 2,2,2
swap_iterations: 2
extension: ".nii"
name: "siaBETA"
network: "SIABETA"
#* Output Settings
output_dir: './logs/${config.dataname}/${config.name}'  # checkpoint_latest save path
save_suffix: '.nii'  # the file format saved when training
#* Model Settings
in_classes: 1
out_classes: 2
load_mode: 0 #0: load nothing 1: load from checkpoint 2: load from pre_trained model(supervised)
ckpt: ' '
latest_checkpoint_file: 'latest_checkpoint.pt'  # ckpt + latest_checkpoint_file determined load which ckpt file
#* Training Settings
crop_or_pad_size: 64, 64, 64  # if 2D: 256,256,1  #USELESS
patch_size: 64, 64, 64  # if 2D: 128,128,1
dataset_ratio: 1
module_list: ["IAM","SAM"]



